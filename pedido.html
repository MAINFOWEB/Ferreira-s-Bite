<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferreira's Bite - Seu Pedido</title>
    <style>
        :root {
            --card-bg: rgba(22, 26, 29, 0.95);
            --neon-red: #ff0055;
            --neon-pink: #ff70a6;
            --neon-blue: #00f0ff;
            --text-color: #f5f3f4;
            --text-muted: #b1a7a6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            color: var(--text-color);
            background: linear-gradient(rgba(11, 9, 10, 0.85), rgba(11, 9, 10, 0.95)), url('assets/img/fachada1.png');
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        h1 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue);
            margin-bottom: 30px;
            font-size: 28px;
        }

        /* Tabela do Carrinho */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        td {
            padding: 15px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 15px;
        }

        .item-total-val {
            font-weight: bold;
            color: var(--neon-blue);
        }

        .btn-remove {
            background: transparent;
            border: none;
            color: var(--neon-red);
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-remove:hover {
            text-shadow: 0 0 8px var(--neon-red);
        }

        /* Total */
        .total-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 240, 255, 0.1);
        }

        .total-container span {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .total-price {
            font-size: 22px;
            font-weight: bold;
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
        }

        /* Formulário de Entrega */
        .form-section {
            margin-bottom: 30px;
        }

        .form-section h3 {
            color: var(--neon-pink);
            text-transform: uppercase;
            font-size: 16px;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 1px dashed rgba(255, 112, 166, 0.3);
            padding-bottom: 5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            font-size: 14px;
            transition: 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
        }

        /* Botões de Ação */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-whatsapp {
            background: #25d366;
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            background: #20ba5a;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.6);
        }

        .btn-back {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: 0.3s;
        }

        .btn-back:hover {
            color: #fff;
            border-color: #fff;
        }

        .empty-cart-msg {
            text-align: center;
            color: var(--text-muted);
            padding: 20px 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Seu Carrinho</h1>

        <table>
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Qtd</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="cartItemsContainer">
                </tbody>
        </table>

        <div class="total-container">
            <span>Total do Pedido:</span>
            <div class="total-price" id="cartTotal">R$ 0,00</div>
        </div>

        <div class="form-section">
            <h3>Dados para Entrega</h3>
            <div class="form-group">
                <label for="customerName">Nome Completo:</label>
                <input type="text" id="customerName" placeholder="Ex: Márcio Ferreira">
            </div>
            <div class="form-group">
                <label for="customerAddress">Endereço e Número:</label>
                <input type="text" id="customerAddress" placeholder="Rua, Número, Bairro">
            </div>
            <div class="form-group">
                <label for="paymentMethod">Forma de Pagamento:</label>
                <select id="paymentMethod">
                    <option value="Pix">Pix</option>
                    <option value="Cartão de Crédito">Cartão de Crédito</option>
                    <option value="Cartão de Débito">Cartão de Débito</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
            </div>
        </div>

        <div class="actions">
            <button class="btn-whatsapp" id="btnEnviar">Enviar Pedido via WhatsApp 🚀</button>
            <a href="index.html" class="btn-back">← Voltar ao Cardápio</a>
        </div>
    </div>

    <script>
        // Carrega os itens salvos do localStorage
        let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
        const container = document.getElementById('cartItemsContainer');
        const totalLabel = document.getElementById('cartTotal');

        function renderizarCarrinho() {
            container.innerHTML = '';
            let totalGeral = 0;

            if (carrinho.length === 0) {
                container.innerHTML = `<tr><td colspan="4" class="empty-cart-msg">Seu carrinho está vazio...</td></tr>`;
                totalLabel.textContent = 'R$ 0,00';
                return;
            }

            carrinho.forEach((item, index) => {
                const subtotal = item.price * item.qtd;
                totalGeral += subtotal;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.name}</td>
                    <td>${item.qtd}x</td>
                    <td class="item-total-val">R$ ${subtotal.toFixed(2).replace('.', ',')}</td>
                    <td style="text-align: right;"><button class="btn-remove" onclick="removerItem(${index})">X</button></td>
                `;
                container.appendChild(tr);
            });

            totalLabel.textContent = `R$ ${totalGeral.toFixed(2).replace('.', ',')}`;
        }

        function removerItem(index) {
            carrinho.splice(index, 1);
            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            renderizarCarrinho();
        }

        // Enviar para o WhatsApp
        document.getElementById('btnEnviar').addEventListener('click', () => {
            if (carrinho.length === 0) {
                alert('Adicione itens ao carrinho antes de enviar!');
                return;
            }

            const nome = document.getElementById('customerName').value.trim();
            const endereco = document.getElementById('customerAddress').value.trim();
            const pagamento = document.getElementById('paymentMethod').value;

            if (!nome || !endereco) {
                alert('Por favor, preencha seu nome e endereço para a entrega.');
                return;
            }

            // Monta o texto do pedido
            let textoWhatsApp = `🍔 *NOVO PEDIDO - FERREIRA'S BITE* 🍔\n\n`;
            textoWhatsApp += `👤 *Cliente:* ${nome}\n`;
            textoWhatsApp += `📍 *Endereço:* ${endereco}\n`;
            textoWhatsApp += `💳 *Pagamento:* ${pagamento}\n\n`;
            textoWhatsApp += `📋 *Itens do Pedido:*\n`;

            let totalGeral = 0;
            carrinho.forEach(item => {
                const subtotal = item.price * item.qtd;
                totalGeral += subtotal;
                textoWhatsApp += `• ${item.qtd}x ${item.name} - R$ ${subtotal.toFixed(2).replace('.', ',')}\n`;
            });

            textoWhatsApp += `\n💰 *Total Geral:* R$ ${totalGeral.toFixed(2).replace('.', ',')}`;

            // Substitua pelo número da sua hamburgueria (com código do país e DDD, ex: 5513999999999)
            const numeroTelefone = '5513999999999'; 
            
            // Abre o WhatsApp com a mensagem formatada
            const url = `https://api.whatsapp.com/send?phone=${numeroTelefone}&text=${encodeURIComponent(textoWhatsApp)}`;
            
            // Limpa o carrinho após enviar (opcional)
            localStorage.removeItem('carrinho');
            
            window.open(url, '_blank');
        });

        // Inicializa a página carregando os dados
        renderizarCarrinho();
    </script>
</body>
</html>
